<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Mobile - Premium E'lon Joylash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        
        /* Maxsus Gamer Dizayn Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #8b5cf6; border-radius: 4px; }
        
        .neon-border {
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4), inset 0 0 10px rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.5);
        }
        .neon-text { text-shadow: 0 0 10px rgba(139, 92, 246, 0.8); }
        .glass-input { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        
        /* Spinner Animatsiyasi */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #8b5cf6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-slate-900 to-black text-white min-h-screen relative overflow-x-hidden">

    <!-- Orqa fon bezaklari -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-pulse delay-1000"></div>

    <!-- Admin Panelga kirish (Qulf) -->
    <div class="absolute top-6 right-6 z-40">
        <button onclick="openAdminLogin()" class="text-purple-400 hover:text-purple-300 hover:scale-110 transition duration-300 drop-shadow-[0_0_8px_rgba(139,92,246,0.8)]" title="Admin Panel">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
        </button>
    </div>

    <!-- ASOSIY FORMA -->
    <div class="max-w-lg mx-auto mt-16 p-8 bg-slate-800/60 backdrop-blur-md rounded-2xl neon-border mb-12 relative z-10">
        <div class="flex justify-center mb-4">
            <img src="https://cdn-icons-png.flaticon.com/512/5260/5260498.png" alt="PUBG" class="w-16 h-16 drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]">
        </div>
        <h2 class="text-3xl font-extrabold text-center mb-8 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400 uppercase tracking-wider neon-text">
            Akkaunt Joylash
        </h2>
        
        <form id="adForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold mb-2 text-purple-200">👤 Telegram Username / Ism:</label>
                <input type="text" id="username" placeholder="@username yoki Ismingiz" required class="w-full p-3 rounded-lg glass-input border border-slate-600 focus:border-purple-500 focus:ring-2 focus:ring-purple-500/50 outline-none transition-all">
            </div>
            
            <!-- VIDEO FAYL YUKLASH -->
            <div>
                <label class="block text-sm font-semibold mb-2 text-purple-200">🎬 Obzor Videosini Tanlang:</label>
                <input type="file" id="videoFile" accept="video/*" required class="w-full p-3 rounded-lg glass-input border border-slate-600 focus:border-purple-500 outline-none transition-all file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-purple-600 file:text-white hover:file:bg-purple-500 cursor-pointer text-gray-300">
                <p class="text-xs text-gray-400 mt-1">* 50 MB gacha bo'lgan video fayl yuklang.</p>
            </div>

            <div class="grid grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-semibold mb-2 text-purple-200">📊 Level:</label>
                    <input type="number" id="level" required class="w-full p-3 rounded-lg glass-input border border-slate-600 focus:border-purple-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2 text-purple-200">🔫 Qurollar soni:</label>
                    <input type="number" id="guns" required class="w-full p-3 rounded-lg glass-input border border-slate-600 focus:border-purple-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2 text-purple-200">🥷 X-Suit soni:</label>
                    <input type="number" id="xsuits" required class="w-full p-3 rounded-lg glass-input border border-slate-600 focus:border-purple-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2 text-purple-200">🎫 RP soni:</label>
                    <input type="number" id="rp" required class="w-full p-3 rounded-lg glass-input border border-slate-600 focus:border-purple-500 outline-none transition-all">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-semibold mb-2 text-purple-200">🚗 Mashinalar:</label>
                    <input type="number" id="cars" required class="w-full p-3 rounded-lg glass-input border border-slate-600 focus:border-purple-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2 text-purple-200">💵 Narxi (so'm):</label>
                    <input type="number" id="price" required class="w-full p-3 rounded-lg glass-input border border-slate-600 focus:border-purple-500 outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2 text-purple-200">📞 Telefon raqam:</label>
                <input type="text" id="phone" placeholder="+998 90 123 45 67" required class="w-full p-3 rounded-lg glass-input border border-slate-600 focus:border-purple-500 outline-none transition-all">
            </div>

            <button id="submitBtn" type="submit" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white font-bold py-4 px-4 rounded-xl transition-all duration-300 mt-6 shadow-[0_0_15px_rgba(139,92,246,0.6)] flex justify-center items-center gap-2 transform hover:-translate-y-1">
                <span>🚀 Adminga Yuborish</span>
            </button>
        </form>

        <div id="successMsg" class="hidden mt-6 p-4 bg-green-500/20 border border-green-500 text-center rounded-xl text-green-300 font-semibold backdrop-blur-sm">
            ✅ Video muvaffaqiyatli yuklandi va Adminga yuborildi!
        </div>
        <div id="errorMsg" class="hidden mt-6 p-4 bg-red-500/20 border border-red-500 text-center rounded-xl text-red-300 font-semibold backdrop-blur-sm"></div>
    </div>

    <!-- 1. PAROL OYNASI -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center z-50 transition-opacity">
        <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl max-w-sm w-full neon-border relative">
            <h3 class="text-2xl mb-2 font-bold text-center text-purple-400">🔒 ADMIN PANEL</h3>
            <p class="text-sm text-gray-400 mb-6 text-center">Kirish uchun parolni kiriting</p>
            
            <!-- PAROL KO'RINIB TURADI type="text" QILINGAN -->
            <input type="text" id="adminPassword" placeholder="Parol (4321)" class="w-full p-4 mb-8 rounded-xl bg-slate-800 border border-purple-500/50 focus:border-purple-500 outline-none text-white text-center tracking-widest text-xl font-bold shadow-inner">
            
            <div class="flex gap-4">
                <button onclick="closeAdminLogin()" class="w-1/2 py-3 bg-slate-700 rounded-xl hover:bg-slate-600 transition font-semibold">Bekor qilish</button>
                <button onclick="verifyPassword()" class="w-1/2 py-3 bg-purple-600 rounded-xl hover:bg-purple-500 transition font-semibold shadow-[0_0_10px_rgba(139,92,246,0.8)]">Kirish</button>
            </div>
        </div>
    </div>

    <!-- 2. ADMIN SOZLAMALARI -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl max-w-md w-full neon-border relative">
            <h3 class="text-2xl mb-2 font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400 flex items-center gap-2">
                ⚙️ Sayt Sozlamalari
            </h3>
            <p class="text-sm text-gray-400 mb-6 border-b border-slate-700 pb-4">Tizim ishlashi uchun botingiz ma'lumotlarini kiriting.</p>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold mb-2 text-purple-300">🤖 Telegram Bot Token:</label>
                    <input type="text" id="botTokenInput" placeholder="123456789:ABCDefgh..." class="w-full p-3 rounded-lg bg-slate-800 border border-slate-600 focus:border-purple-500 outline-none text-white font-mono text-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2 text-purple-300">👑 Admin Telegram ID:</label>
                    <input type="text" id="adminIdInput" placeholder="Masalan: 123456789" class="w-full p-3 rounded-lg bg-slate-800 border border-slate-600 focus:border-purple-500 outline-none text-white font-mono">
                </div>
            </div>
            
            <div class="flex justify-end gap-4 mt-8">
                <button onclick="closeSettings()" class="px-6 py-3 bg-slate-700 rounded-xl hover:bg-slate-600 transition font-semibold text-white">Yopish</button>
                <button onclick="saveSettings()" class="px-6 py-3 bg-gradient-to-r from-green-500 to-emerald-600 rounded-xl hover:from-green-400 hover:to-emerald-500 transition font-bold text-white shadow-[0_0_10px_rgba(16,185,129,0.5)]">💾 Saqlash</button>
            </div>
        </div>
    </div>

    <script>
        // --- ADMIN PANEL QISMI ---
        function openAdminLogin() {
            document.getElementById('loginModal').classList.remove('hidden');
            document.getElementById('adminPassword').value = '';
        }
        function closeAdminLogin() { document.getElementById('loginModal').classList.add('hidden'); }

        function verifyPassword() {
            let pwd = document.getElementById('adminPassword').value;
            if (pwd === '4321') {
                document.getElementById('loginModal').classList.add('hidden');
                document.getElementById('settingsModal').classList.remove('hidden');
                document.getElementById('botTokenInput').value = localStorage.getItem('site_bot_token') || '';
                document.getElementById('adminIdInput').value = localStorage.getItem('site_admin_id') || '';
            } else {
                alert("❌ Parol noto'g'ri!");
            }
        }

        function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }

        function saveSettings() {
            let token = document.getElementById('botTokenInput').value.trim();
            let adminId = document.getElementById('adminIdInput').value.trim();
            if(!token || !adminId) return alert("Hamma maydonlarni to'ldiring!");
            localStorage.setItem('site_bot_token', token);
            localStorage.setItem('site_admin_id', adminId);
            alert("✅ Sozlamalar saqlandi!");
            closeSettings();
        }

        function showError(msg) {
            let errBox = document.getElementById('errorMsg');
            errBox.innerText = msg;
            errBox.classList.remove('hidden');
            setTimeout(() => errBox.classList.add('hidden'), 7000);
        }

        // --- FORMA YUBORISH (Fayl va Tugmalar bilan) ---
        document.getElementById('adForm').addEventListener('submit', function(e) {
            e.preventDefault();

            let botToken = localStorage.getItem('site_bot_token');
            let adminId = localStorage.getItem('site_admin_id');

            if (!botToken || !adminId) {
                return showError("❌ Xatolik! Saytga Token va Admin ID kiritilmagan. Qulf belgisini bosib kiritib oling.");
            }

            let fileInput = document.getElementById('videoFile').files[0];
            if (!fileInput) return showError("Iltimos videoni tanlang!");

            // Xabar matnini tuzish
            let textMessage = `🌐 Saytdan Yangi E'lon!\n\n` +
                              `👤 Kimdan: ${document.getElementById('username').value}\n` +
                              `📊 Level: ${document.getElementById('level').value}\n` +
                              `🔫 Qurollar: ${document.getElementById('guns').value} ta\n` +
                              `🥷 X-Suit: ${document.getElementById('xsuits').value} ta\n` +
                              `🎫 RP: ${document.getElementById('rp').value} ta\n` +
                              `🚗 Mashinalar: ${document.getElementById('cars').value} ta\n` +
                              `💵 Narxi: ${document.getElementById('price').value} so'm\n` +
                              `📞 Tel: ${document.getElementById('phone').value}`;

            let submitBtn = document.getElementById('submitBtn');
            let originalBtnHtml = submitBtn.innerHTML;
            submitBtn.disabled = true;
            // Yuklanish animatsiyasini tugmaga qo'shish
            submitBtn.innerHTML = `<div class="loader"></div> <span>Video yuklanmoqda (Kuting...)</span>`;

            // Telegram ga yuborish uchun ma'lumotlarni FormData ga joylash
            let formData = new FormData();
            formData.append('chat_id', adminId);
            formData.append('video', fileInput);
            formData.append('caption', textMessage);

            // ADMIN GA BORADIGAN TASDIQLASH TUGMALARI
            let replyMarkup = {
                inline_keyboard: [[
                        { text: "✅ Tasdiqlash", callback_data: "web_ok" },
                        { text: "❌ Bekor qilish", callback_data: "web_no" }
                    ]
                ]
            };
            formData.append('reply_markup', JSON.stringify(replyMarkup));

            // Telegram API - sendVideo
            fetch(`https://api.telegram.org/bot${botToken}/sendVideo`, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnHtml;

                if (data.ok) {
                    document.getElementById('successMsg').classList.remove('hidden');
                    document.getElementById('adForm').reset();
                    setTimeout(() => document.getElementById('successMsg').classList.add('hidden'), 5000);
                } else {
                    showError("❌ Telegram botda xatolik! Kiritilgan Token yoki ID noto'g'ri bo'lishi mumkin. Xato: " + data.description);
                }
            })
            .catch(err => {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnHtml;
                showError("Tarmoqda xatolik yuz berdi. Internetni tekshiring yoki video hajmi juda katta (Telegram limit 50MB).");
            });
        });
    </script>
</body>
</html>
